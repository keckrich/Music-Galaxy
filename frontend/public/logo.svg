<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e0e20"/>
      <stop offset="100%" stop-color="#04040d"/>
    </radialGradient>
    <radialGradient id="coreAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#aabbff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4466ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2" x="-220%" y="-220%" width="540%" height="540%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="31.5"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>

  <g clip-path="url(#clip)">
    <!-- Outer dim stars for depth -->
    <circle cx="9"  cy="11" r="0.6" fill="#2233bb" opacity="0.38"/>
    <circle cx="55" cy="9"  r="0.5" fill="#1a2288" opacity="0.32"/>
    <circle cx="59" cy="27" r="0.7" fill="#992211" opacity="0.38"/>
    <circle cx="5"  cy="48" r="0.6" fill="#332299" opacity="0.32"/>
    <circle cx="56" cy="55" r="0.6" fill="#882222" opacity="0.38"/>
    <circle cx="17" cy="59" r="0.5" fill="#443399" opacity="0.32"/>
    <circle cx="45" cy="5"  r="0.6" fill="#1144bb" opacity="0.38"/>
    <circle cx="4"  cy="31" r="0.5" fill="#2244aa" opacity="0.32"/>
    <circle cx="34" cy="60" r="0.55" fill="#553388" opacity="0.3"/>
    <circle cx="60" cy="40" r="0.5" fill="#aa4411" opacity="0.3"/>

    <!-- Mid-ring particles -->
    <!-- Blues/purples — left arc -->
    <circle cx="12" cy="36" r="1.1" fill="#4455dd" opacity="0.72" filter="url(#g1)"/>
    <circle cx="15" cy="21" r="1.3" fill="#5577ee" opacity="0.76" filter="url(#g1)"/>
    <circle cx="19" cy="49" r="1.2" fill="#6644cc" opacity="0.7"  filter="url(#g1)"/>
    <circle cx="9"  cy="43" r="1.0" fill="#5533bb" opacity="0.65" filter="url(#g1)"/>
    <!-- Cyans — upper arc -->
    <circle cx="27" cy="10" r="1.3" fill="#22ccff" opacity="0.76" filter="url(#g1)"/>
    <circle cx="39" cy="7"  r="1.1" fill="#33ddff" opacity="0.7"  filter="url(#g1)"/>
    <circle cx="20" cy="14" r="1.2" fill="#44aaff" opacity="0.73" filter="url(#g1)"/>
    <!-- Oranges/warm — right arc -->
    <circle cx="53" cy="31" r="1.2" fill="#ff5522" opacity="0.7"  filter="url(#g1)"/>
    <circle cx="51" cy="19" r="1.3" fill="#ff7733" opacity="0.75" filter="url(#g1)"/>
    <circle cx="55" cy="44" r="1.1" fill="#ff4411" opacity="0.68" filter="url(#g1)"/>
    <circle cx="46" cy="52" r="1.2" fill="#ff8833" opacity="0.7"  filter="url(#g1)"/>

    <!-- Inner cluster — bright -->
    <circle cx="20" cy="30" r="1.8" fill="#6688ff" opacity="0.92" filter="url(#g1)"/>
    <circle cx="22" cy="22" r="1.6" fill="#44aaff" opacity="0.9"  filter="url(#g1)"/>
    <circle cx="17" cy="39" r="1.7" fill="#7755ee" opacity="0.9"  filter="url(#g1)"/>
    <circle cx="25" cy="45" r="1.5" fill="#9966ff" opacity="0.86" filter="url(#g1)"/>
    <circle cx="30" cy="16" r="1.9" fill="#33eeff" opacity="0.93" filter="url(#g1)"/>
    <circle cx="23" cy="27" r="1.7" fill="#55ccff" opacity="0.9"  filter="url(#g1)"/>
    <circle cx="44" cy="25" r="1.9" fill="#ff8844" opacity="0.93" filter="url(#g1)"/>
    <circle cx="42" cy="39" r="1.8" fill="#ffaa44" opacity="0.9"  filter="url(#g1)"/>
    <circle cx="49" cy="32" r="1.6" fill="#ff6622" opacity="0.88" filter="url(#g1)"/>
    <circle cx="39" cy="47" r="1.7" fill="#ff9944" opacity="0.88" filter="url(#g1)"/>

    <!-- Near-center nodes — strongest glow -->
    <circle cx="25" cy="33" r="2.4" fill="#88bbff" filter="url(#g1)"/>
    <circle cx="38" cy="27" r="2.5" fill="#ffaa55" filter="url(#g1)"/>
    <circle cx="31" cy="21" r="2.3" fill="#44eeff" filter="url(#g1)"/>
    <circle cx="27" cy="41" r="2.3" fill="#bb77ff" filter="url(#g1)"/>
    <circle cx="41" cy="41" r="2.4" fill="#ffbb55" filter="url(#g1)"/>
    <circle cx="37" cy="18" r="2.1" fill="#55ddff" filter="url(#g1)"/>
    <circle cx="22" cy="34" r="2.0" fill="#7799ff" filter="url(#g1)"/>
    <circle cx="36" cy="44" r="2.1" fill="#cc88ff" filter="url(#g1)"/>

    <!-- Faint similarity lines from center -->
    <g opacity="0.16" stroke="white" stroke-width="0.45" fill="none">
      <line x1="32" y1="32" x2="25" y2="33"/>
      <line x1="32" y1="32" x2="38" y2="27"/>
      <line x1="32" y1="32" x2="31" y2="21"/>
      <line x1="32" y1="32" x2="27" y2="41"/>
      <line x1="32" y1="32" x2="41" y2="41"/>
      <line x1="32" y1="32" x2="37" y2="18"/>
      <line x1="32" y1="32" x2="22" y2="34"/>
    </g>

    <!-- Core aura -->
    <circle cx="32" cy="32" r="8" fill="url(#coreAura)" opacity="0.5"/>

    <!-- Central star — layered glow -->
    <circle cx="32" cy="32" r="5.5" fill="white" opacity="0.07" filter="url(#g2)"/>
    <circle cx="32" cy="32" r="3.2" fill="white" opacity="0.35" filter="url(#g2)"/>
    <circle cx="32" cy="32" r="1.9" fill="white" opacity="0.9"  filter="url(#g2)"/>
    <circle cx="32" cy="32" r="1.0" fill="white"/>
  </g>

  <!-- Subtle outer rim -->
  <circle cx="32" cy="32" r="31.5" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="0.5"/>
</svg>
